services:
  - type: web
    name: baseapps-backend
    plan: free
    region: ohio
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Manually set in dashboard after creating DB
      - key: JWT_SECRET
        generateValue: true
      - key: ALCHEMY_API_KEY
        sync: false  # Manually set in dashboard
    healthCheckPath: /health
